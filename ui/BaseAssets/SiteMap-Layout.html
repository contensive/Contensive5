<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="layout" content="Site Map Layout">
    <title>Site Map</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous"></head>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg==" crossorigin="anonymous" referrerpolicy="no-referrer" />

<body>
    <style>
    .sitemap-container {
        padding: 20px;
    }

    .sitemap-page-name {
        font-weight: bold;
        font-size: 21px !important;
        margin-bottom: 0 !important;
    }

    .sitemap-details {
        list-style-type: none;
        padding-left: 0;
        margin-bottom: 0;
    }

    .sitemap-details li {
        margin-bottom: 5px;
    }

    .sitemap-details p {
        margin: 0;
    }

    </style>

      <div class="sitemap-container">
        {{#hasPages}}
            <div class="vstack gap-3 sitemap-list">
                {{#pages}}
                    <div class="sitemap-page p-2 mb-4">
                        <div class="hstack gap-2 mb-2">
                            <h2 class="sitemap-page-name {{#isRoot}}root{{/isRoot}}">{{name}}</h2>
                            <p class="sitemap-page-id m-0">(ID: {{id}})</p>
                            <a href="{{editUrl}}" class="mb-0"><i class="fa-solid fa-pen-to-square"></i></a>
                        </div>
                        <ul class="sitemap-details">
                            <li><a href="{{siteUrl}}" class="fw-medium text-decoration-none">{{siteUrl}}</a></li>
                            <li><p><span class="fw-medium">Hits:</span> {{pageHits}}</p></li>
                        {{#pageLastModifiedDate}}
                            <li><p><span class="fw-medium">Modified:</span> {{pageLastModifiedDate}}</p></li>
                        {{/pageLastModifiedDate}}
                        </ul>
                    </div>
                {{/pages}}
            </div>
        {{/hasPages}}

        {{^hasPages}}
            <div class="alert alert-warning">No active pages found.</div>
        {{/hasPages}}
    </div>

    

<script data-delete src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js" integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r" crossorigin="anonymous"></script>
<script data-delete src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js" integrity="sha384-G/EV+4j2dNv+tEPo3++6LCgdCROaejBqfUeNjuKAiuXbjrxilcCdDz6ZAVfHWe1Y" crossorigin="anonymous"></script>
</body>
</html>
